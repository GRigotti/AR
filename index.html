<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AR Modelos</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    html, body { margin: 0; padding: 0; width: 100vw; height: 100dvh; background-color: #222222; overflow: hidden; }
    model-viewer { position: absolute; top: 0; left: 0; width: 100vw; height: 100dvh; background-color: transparent; display: block; }

    .menu-modelos {
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 8px; z-index: 9999; flex-wrap: wrap; justify-content: center; width: 90%;
    }

    .btn-trocar {
      background-color: rgba(255, 255, 255, 0.8); color: #333; border: 2px solid #ffffff;
      border-radius: 8px; padding: 8px 12px; font-size: 14px; font-weight: bold; cursor: pointer;
      box-shadow: 0px 2px 5px rgba(0,0,0,0.3); backdrop-filter: blur(4px);
    }

    .botao-ar-customizado {
      background-color: #ffffff; color: #333333; border: none; border-radius: 8px;
      position: absolute !important; bottom: 40px !important; left: 50% !important;
      transform: translateX(-50%) !important; padding: 12px 24px; font-size: 16px;
      font-weight: bold; box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.3); z-index: 9999 !important;
    }
  </style>
</head>

<body>

<div class="menu-modelos">
  <button class="btn-trocar" onclick="mudarModelo('Teste.glb')">Padrão</button>
  <button class="btn-trocar" onclick="mudarModelo('Teste_Lado.glb')">De Lado</button>
  <button class="btn-trocar" onclick="mudarModelo('Teste_pe.glb')">Em Pé</button>
  <button class="btn-trocar" onclick="mudarModelo('Teste_virada.glb')">Virada</button>
</div>

<model-viewer
  id="meuViewer"
  src="Teste.glb"
  ios-src="Teste.usdz"
  ar
  ar-modes="webxr scene-viewer quick-look"
  camera-controls
  auto-rotate>

  <button slot="ar-button" class="botao-ar-customizado">
    📸 Ver no meu espaço
  </button>
</model-viewer>

<script>
  function mudarModelo(nomeDoArquivoGLB) {
    const visualizador = document.getElementById('meuViewer');
    
    // 1. Cria o nome do arquivo .usdz
    const nomeDoArquivoUSDZ = nomeDoArquivoGLB.replace('.glb', '.usdz');
    
    // 2. Remove o modelo atual e forçamos a atualização dos atributos
    visualizador.src = nomeDoArquivoGLB;
    visualizador.setAttribute('ios-src', nomeDoArquivoUSDZ);

    // 3. O "Pulo do Gato": Forçamos o reload do componente
    // Isso garante que, mesmo com o AR aberto ou prestes a abrir, 
    // ele carregue a nova fonte de dados.
    visualizador.dismissPoster(); 
    
    console.log("Modelo trocado para: " + nomeDoArquivoGLB);
  }
</script>

</body>
</html>
